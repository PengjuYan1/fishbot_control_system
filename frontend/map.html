<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishbot Points</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Point Management</p>
        <h1>地图与点位管理</h1>
      </div>
    </header>
    <main class="dashboard-grid">
      <section class="map-stage panel">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Map</p>
            <h2>点位编辑画布</h2>
          </div>
        </div>
        <div class="map-canvas" id="point-canvas">
          <div class="map-overlay-note" id="selection-status">点击地图以拾取坐标，再录入机器人原生点位 ID</div>
        </div>
      </section>
      <aside class="side-column">
        <section class="panel status-panel">
          <div class="panel-header compact">
            <div>
              <p class="panel-kicker">Editor</p>
              <h2>点位录入</h2>
            </div>
          </div>
          <form id="point-form" class="point-form">
            <label>
              <span>点位名称</span>
              <input id="point-name" name="name" type="text" placeholder="F1 / C1">
            </label>
            <div class="point-form-grid">
              <label>
                <span>X</span>
                <input id="point-x" name="x" type="number" step="0.01" placeholder="0.00">
              </label>
              <label>
                <span>Y</span>
                <input id="point-y" name="y" type="number" step="0.01" placeholder="0.00">
              </label>
              <label>
                <span>Theta</span>
                <input id="point-theta" name="theta" type="number" step="0.01" placeholder="0.00">
              </label>
            </div>
            <div class="point-form-grid">
              <label>
                <span>floor_id</span>
                <input id="point-floor-id" name="floor_id" type="number" step="1" placeholder="0">
              </label>
              <label>
                <span>map_id</span>
                <input id="point-map-id" name="map_id" type="number" step="1" placeholder="0">
              </label>
              <label>
                <span>point_id</span>
                <input id="point-point-id" name="point_id" type="number" step="1" placeholder="0">
              </label>
            </div>
            <div class="task-buttons">
              <button type="button" class="accent" id="save-feed-point">保存投喂点</button>
              <button type="button" id="save-charge-point">保存充电点</button>
            </div>
          </form>
        </section>
        <section class="panel status-panel">
          <div class="panel-header compact">
            <div>
              <p class="panel-kicker">Points</p>
              <h2>点位列表</h2>
            </div>
          </div>
          <div id="point-list"></div>
        </section>
      </aside>
    </main>
  </div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/points.js"></script>
</body>
</html>
